# Navigation Links
#   To link a homepage widget, specify the URL as a hash `#` followed by the filename of the
#     desired widget in your `content/home/` folder.
#   The weight parameter defines the order that the links will appear in.

main:
  - name: Home
    url: '#about'
    weight: 10
  - name: Research
    url: '#papers'
    weight: 20
  - name: Teaching
    url: '#teaching'
    weight: 30
  - name: Policy
    url: '#policy'
    weight: 40
  - name: Opinion
    url: '#opinion'
    weight: 50
  - name: Contact
    url: '#contact'
    weight: 60

# Link to a PDF of your CV from the menu.
  - name: CV
    url: uploads/cv.pdf
    weight: 70
